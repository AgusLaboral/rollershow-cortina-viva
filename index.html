<html lang="es">

<script type="importmap">

  "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"

<style>
@font-face{font-family:"Bricolage Grotesque";src:url("assets/brand/bricolage-grotesque-latin-variable.woff2") format("woff2");font-weight:400 800;font-display:swap}
@font-face{font-family:Manrope;src:url("assets/brand/manrope-latin-variable.woff2") format("woff2");font-weight:400 700;font-display:swap}
:root{color-scheme:dark;--cream:#FAF7F2;--white:#FFF;--sand:#F1EBE0;--ink:#1C1816;--soft:#4A4039;--muted:#87796D;--line:#E4DCCE;--line-strong:#C8BCA8;--terracotta:#B8662C;--accent:#C63A21;--accent-deep:#97290F;--dur-exit:140ms;--dur-fast:180ms;--dur:280ms;--dur-scene:480ms;--ease:cubic-bezier(.22,1,.36,1);--ease-exit:cubic-bezier(.55,0,1,.45);--ease-material:cubic-bezier(.16,1,.3,1)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--ink);color:var(--cream);font-family:Manrope,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.stage{position:relative;width:100vw;height:100svh}
canvas#scene{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
.brand-header{position:absolute;inset:0 0 auto;z-index:7;min-height:88px;padding:24px clamp(22px,4vw,56px);display:flex;align-items:flex-start;justify-content:space-between;pointer-events:none;background:linear-gradient(to bottom,rgba(28,24,22,.72),rgba(28,24,22,0))}
.brand-header a{pointer-events:auto}.brand-logo{width:min(42vw,196px);height:auto;display:block}
.hint{position:absolute;left:clamp(22px,6vw,86px);top:108px;z-index:4;font-size:12px;color:#d9d0c6;text-shadow:0 2px 10px #000;transition:opacity .48s ease}.hint.hidden{opacity:0}
.mute-btn{position:absolute;top:22px;right:clamp(18px,4vw,54px);z-index:8;min-width:92px;height:44px;padding:0 10px;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(28,24,22,.42);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:var(--cream);font:600 12px/1 Manrope,sans-serif;cursor:pointer;transition:background .18s ease}.mute-btn:hover{background:rgba(28,24,22,.7)}.mute-btn svg{width:19px;height:19px}.mute-btn .off{display:none}.mute-btn.muted .on{display:none}.mute-btn.muted .off{display:block}
.product-label{position:absolute;left:clamp(22px,6vw,86px);bottom:11%;z-index:4;pointer-events:none;transition:bottom .48s cubic-bezier(.16,1,.3,1)}.product-label.raised{bottom:24%}.product-label .name,.product-label .color{display:block;transition:opacity .35s ease,transform .35s ease}.product-label .name{font:650 clamp(34px,5vw,58px)/1.02 "Bricolage Grotesque",sans-serif;letter-spacing:-.04em;text-shadow:0 2px 18px rgba(0,0,0,.85)}.product-label .color{font-size:13px;color:#d9d0c6;margin-top:8px;text-shadow:0 2px 12px #000}.product-label.switching .name,.product-label.switching .color{opacity:0;transform:translateY(6px)}
.nav-btn{position:absolute;transform:translate(-50%,-50%);z-index:5;min-width:140px;height:56px;padding:0 10px;display:flex;align-items:center;gap:10px;color:rgba(250,247,242,.86);background:transparent;border:0;border-radius:0;font:600 13px/1 Manrope,sans-serif;text-shadow:0 2px 10px rgba(0,0,0,.85);cursor:pointer;isolation:isolate;transition:color var(--dur-fast) ease,transform var(--dur-fast) var(--ease)}.nav-btn::before{content:"";position:absolute;inset:0;z-index:-1;background:radial-gradient(ellipse at center,rgba(28,24,22,.84) 0 28%,rgba(28,24,22,.48) 52%,transparent 76%);opacity:.78;transition:opacity var(--dur-fast) ease}.nav-prev{justify-content:flex-start}.nav-next{justify-content:flex-end}.nav-btn::after{content:"";position:absolute;left:10px;right:10px;bottom:5px;height:1px;background:rgba(250,247,242,.42);transform:scaleX(.62);transition:transform var(--dur) var(--ease),background var(--dur-fast) ease}.nav-prev::after{transform-origin:left}.nav-next::after{transform-origin:right}.nav-btn:hover{color:var(--white);transform:translate(-50%,calc(-50% - 1px))}.nav-btn:hover::before{opacity:1}.nav-btn:hover::after{transform:scaleX(1);background:rgba(250,247,242,.82)}.nav-btn:active{transform:translate(-50%,-50%)}.nav-btn:disabled{opacity:.3;pointer-events:none}.nav-btn svg{position:relative;width:24px;height:24px;flex:none;transition:transform var(--dur-fast) var(--ease)}.nav-prev:hover svg{transform:translateX(-3px)}.nav-next:hover svg{transform:translateX(3px)}
.measure-panel{position:absolute;left:0;right:0;bottom:0;z-index:6;margin:0 auto 22px;width:min(calc(100% - 48px),860px);padding:17px 22px 10px;color:var(--cream);background:linear-gradient(90deg,transparent,rgba(28,24,22,.86) 9%,rgba(28,24,22,.93) 50%,rgba(28,24,22,.86) 91%,transparent);border:0;border-radius:0;box-shadow:none;display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:center;gap:26px;transform:translateY(18px);opacity:0;pointer-events:none;transition:opacity var(--dur-scene) var(--ease-material),transform var(--dur-scene) var(--ease-material)}.measure-panel::before{content:"";position:absolute;left:7%;right:7%;top:0;height:1px;background:rgba(250,247,242,.48);transform:scaleX(0);transform-origin:center;transition:transform 720ms var(--ease-material)}.measure-panel.visible{opacity:1;transform:translateY(0);pointer-events:auto}.measure-panel.visible::before{transform:scaleX(1)}
.stepper-row{display:flex;gap:24px}.stepper{position:relative;display:flex;flex-direction:column;gap:5px;min-width:156px}.stepper-label{font-size:11px;color:rgba(250,247,242,.65)}.controls{position:relative;display:grid;grid-template-columns:40px minmax(72px,auto) 40px;align-items:center;height:50px;border:0;border-top:1px solid rgba(250,247,242,.28);border-radius:0;background:transparent;overflow:visible}.controls::before,.controls::after{content:"";position:absolute;top:-5px;width:1px;height:10px;background:rgba(250,247,242,.42)}.controls::before{left:0}.controls::after{right:0}.stepper button{width:40px;height:49px;border:0;background:none;color:var(--cream);font:400 21px/1 Manrope,sans-serif;cursor:pointer;transition:background var(--dur-fast) ease,color var(--dur-fast) ease}.stepper button:hover{background:rgba(250,247,242,.08);color:var(--white)}.measure{display:flex;align-items:baseline;justify-content:center;min-height:30px;border-inline:1px solid rgba(250,247,242,.12)}.value{font-variant-numeric:tabular-nums;font-size:19px;font-weight:650;min-width:3ch;text-align:center}.unit{font-size:12px;color:rgba(250,247,242,.58);margin-left:5px}.measure-panel.visible .stepper{animation:measure-value-in var(--dur-fast) var(--ease) 540ms both}
.cta{position:relative;isolation:isolate;overflow:hidden;height:52px;padding:0 24px;border:1px solid var(--accent);border-radius:6px;background:var(--accent);color:var(--white);font:600 14px/1 Manrope,sans-serif;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:10px;white-space:nowrap;box-shadow:0 8px 20px rgba(151,41,15,.24);transition:transform var(--dur-exit) var(--ease-exit),box-shadow var(--dur-exit) var(--ease-exit)}.cta::before{content:"";position:absolute;inset:0;z-index:-1;background:var(--accent-deep);transform:translateX(-101%);transition:transform var(--dur-fast) var(--ease)}.cta:hover{transform:translateY(-1px);box-shadow:0 10px 24px -5px rgba(151,41,15,.48)}.cta:hover::before{transform:translateX(0)}.cta:active{transform:translateY(1px)}.cta span,.cta svg{position:relative;z-index:1}.cta svg{width:18px;height:18px;transition:transform var(--dur-fast) var(--ease)}.cta:hover svg{transform:translateX(4px)}.measure-panel.visible .cta{animation:cta-enter var(--dur-scene) var(--ease-material) 620ms both}.measure-panel.visible .cta svg{animation:cta-arrow-nudge 620ms var(--ease) 1080ms both}
@keyframes measure-value-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}@keyframes cta-enter{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}@keyframes cta-arrow-nudge{0%,100%{transform:none}55%{transform:translateX(5px)}}
button:focus-visible,.cta:focus-visible,a:focus-visible{outline:2px solid var(--terracotta);outline-offset:3px}
@media(min-width:641px){.product-label,.product-label.raised{top:18%;bottom:auto}}
@media(max-width:640px){.brand-header{min-height:72px;padding:20px}.brand-logo{width:min(58vw,172px)}.hint{left:20px;top:86px;max-width:55vw;line-height:1.45}.mute-btn{top:14px;right:14px;min-width:44px;width:44px;padding:0}.mute-btn span{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}.product-label{left:20px;bottom:29%}.product-label.raised{bottom:37%}.product-label .name{font-size:34px}.nav-btn{min-width:116px;height:52px;padding:0 8px}.nav-btn::after{left:8px;right:8px}.measure-panel{width:100%;margin:0;padding:16px 18px max(16px,env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(28,24,22,.86),rgba(28,24,22,.98));gap:13px}.measure-panel::before{left:0;right:0}.stepper-row{width:100%;gap:18px}.stepper{flex:1;min-width:0}.controls{grid-template-columns:40px minmax(48px,1fr) 40px}.cta{width:100%;height:52px}}
@media(max-width:370px){.nav-btn{min-width:102px;font-size:12px}.measure-panel{padding-inline:12px}.stepper-row{gap:8px}.controls{grid-template-columns:38px minmax(42px,1fr) 38px}.stepper button{width:38px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:0ms!important;animation-duration:0ms!important}}
</style>
</head>
<body>
<main class="stage">
  <canvas id="scene"></canvas>
  <header class="brand-header"><a href="https://www.rollershow.com.ar/" aria-label="RollerShow, ir al sitio"><img class="brand-logo" src="assets/brand/rollershow-logo-static-blanco.svg" alt="RollerShow"></a></header>
  <p class="hint" id="hint">Movela con el dedo, el mouse o inclinando el teléfono</p>
  <button class="mute-btn" id="muteBtn" aria-label="Silenciar música">
    <svg class="on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18 6a8.5 8.5 0 0 1 0 12"/></svg>
    <svg class="off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg><span>Sonido</span>
  </button>
  <div class="product-label" id="productLabel" aria-live="polite"><span class="name" id="productName">Blackout</span><span class="color" id="productColor">Blanco</span></div>
  <button class="nav-btn nav-prev" id="prevBtn" aria-label="Producto anterior"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg><span>Anterior</span></button>
  <button class="nav-btn nav-next" id="nextBtn" aria-label="Producto siguiente"><span>Siguiente</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg></button>
  <div class="measure-panel" id="measurePanel">
    <div class="stepper-row">
      <div class="stepper"><span class="stepper-label">Ancho</span><div class="controls"><button type="button" data-step="ancho" data-dir="-1" aria-label="Reducir ancho">−</button><span class="measure"><span class="value" id="anchoValue">120</span><span class="unit">cm</span></span><button type="button" data-step="ancho" data-dir="1" aria-label="Aumentar ancho">+</button></div></div>
      <div class="stepper"><span class="stepper-label">Alto</span><div class="controls"><button type="button" data-step="alto" data-dir="-1" aria-label="Reducir alto">−</button><span class="measure"><span class="value" id="altoValue">150</span><span class="unit">cm</span></span><button type="button" data-step="alto" data-dir="1" aria-label="Aumentar alto">+</button></div></div>
    </div>
    <a class="cta" id="ctaQuote" href="https://www.rollershow.com.ar/cotizar/tradicionales" aria-label="Cotizar cortinas a medida en RollerShow"><span>Cotizá tus cortinas a medida</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="m14 6 6 6-6 6"/></svg></a>
  </div>
</main>
<script type="module" src="main.js"></script>
</body>
</html>
