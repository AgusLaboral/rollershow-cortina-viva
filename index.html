<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rollershow — Cortinas tradicionales</title>
<meta name="description" content="Blackout, Gasa y Tusor. Mové la tela, compará cómo filtra la luz y elegí la medida de tu cortina tradicional.">
<meta name="theme-color" content="#090908">
<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
} }
</script>
<style>
  :root{
    color-scheme:dark;
    --ink:#f3efe8;
    --muted:#b9b3aa;
    --panel-ink:#f3efe8;
    --panel-muted:#b9b3aa;
    --accent:#C63A21;
    --accent-ink:#fff;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#090908;
    color:var(--ink);
    font-family:system-ui, -apple-system, 'Segoe UI', sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  .stage{ position:relative; width:100vw; height:100svh; }
  canvas#scene{ position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }

  .product-label{
    position:absolute;
    left:6%;
    bottom:9%;
    z-index:4;
    pointer-events:none;
    transition:bottom .5s cubic-bezier(.16,1,.3,1);
  }
  .product-label.raised{ bottom:23%; }
  .product-label .name,
  .product-label .color{
    display:block;
    transition:opacity .35s ease, transform .35s ease;
  }
  .product-label .name{
    font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(30px, 7vw, 44px);
    line-height:1;
    text-shadow:0 2px 18px rgba(0,0,0,.85), 0 1px 4px rgba(0,0,0,.95);
  }
  .product-label .color{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:8px;
    text-shadow:0 2px 12px rgba(0,0,0,.9);
  }
  .product-label.switching .name,
  .product-label.switching .color{
    opacity:0;
    transform:translateY(6px);
  }

  .nav-btn{
    position:absolute;
    transform:translate(-50%,-50%);
    z-index:5;
    width:72px; height:72px;
    display:flex; align-items:center; justify-content:center;
    background:none; border:none;
    color:var(--ink);
    cursor:pointer;
    opacity:.94;
    transition:opacity .2s ease, transform .2s ease;
  }
  .nav-btn::before{
    content:"";
    position:absolute;
    inset:8px;
    border:1px solid rgba(255,255,255,.46);
    border-radius:50%;
    background:rgba(24,22,19,.34);
    box-shadow:0 0 24px rgba(255,205,143,.32), inset 0 0 18px rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    transition:background .2s ease, box-shadow .2s ease, transform .2s ease;
  }
  .nav-btn:hover::before{
    background:rgba(255,225,184,.2);
    box-shadow:0 0 34px rgba(255,194,119,.64), inset 0 0 20px rgba(255,255,255,.16);
    transform:scale(1.06);
  }
  .nav-btn:active{ transform:translate(-50%,-50%) scale(.92); }
  .nav-btn:disabled{ opacity:.25; pointer-events:none; }
  .nav-btn svg{ position:relative; z-index:1; width:34px; height:34px; filter:drop-shadow(0 2px 8px rgba(0,0,0,.85)); }

  .measure-panel{
    position:absolute;
    left:0; right:0; bottom:0;
    z-index:6;
    width:100%;
    padding:34px max(5vw, calc((100vw - 760px) / 2)) 24px;
    color:var(--panel-ink);
    background:linear-gradient(to top, rgba(10,9,8,.96), rgba(10,9,8,.78) 62%, rgba(10,9,8,0));
    backdrop-filter:blur(10px);
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    gap:52px;
    transform:translateY(18px);
    opacity:0;
    pointer-events:none;
    transition:opacity .6s cubic-bezier(.16,1,.3,1), transform .6s cubic-bezier(.16,1,.3,1);
  }
  .measure-panel.visible{ opacity:1; transform:translateY(0); pointer-events:auto; }

  .stepper-row{ display:flex; gap:28px; }
  .stepper{ display:flex; flex-direction:column; gap:8px; }
  .stepper .stepper-label{
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--panel-muted);
  }
  .stepper .controls{
    display:flex;
    align-items:baseline;
    gap:0;
    border-bottom:1px solid rgba(243,239,232,.5);
    padding-bottom:5px;
  }
  .stepper button{
    background:none;
    border:none;
    color:var(--panel-ink);
    font-size:22px;
    line-height:1;
    cursor:pointer;
    width:44px;
    height:44px;
    padding:0;
    opacity:.75;
  }
  .stepper button:hover{ opacity:1; }
  .stepper .value{
    font-variant-numeric:tabular-nums;
    font-size:26px;
    min-width:2.2ch;
    text-align:center;
  }
  .stepper .unit{ font-size:12px; color:var(--panel-muted); margin-left:2px; }

  .cta{
    background:var(--accent);
    color:var(--accent-ink);
    border:none;
    min-height:52px;
    padding:15px 26px;
    border-radius:3px;
    font-size:15px;
    font-weight:600;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:9px;
    white-space:nowrap;
    box-shadow:0 8px 24px rgba(198,58,33,.35);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cta:hover{ transform:translateY(-1px); box-shadow:0 10px 28px rgba(198,58,33,.45); }
  .cta:active{ transform:translateY(0); }
  .cta svg{ width:18px; height:18px; }

  .hint{
    position:absolute;
    left:6%;
    top:8%;
    z-index:4;
    font-size:11.5px;
    letter-spacing:.06em;
    color:var(--muted);
    text-shadow:0 2px 10px rgba(0,0,0,.95);
    opacity:1;
    transition:opacity .5s ease;
  }
  .hint.hidden{ opacity:0; }

  .mute-btn{
    position:absolute;
    top:5%;
    right:4%;
    z-index:5;
    width:44px; height:44px;
    display:flex; align-items:center; justify-content:center;
    background:none; border:none;
    color:var(--muted);
    cursor:pointer;
    opacity:.78;
    transition:opacity .2s ease;
  }
  .mute-btn:hover{ opacity:1; }
  .mute-btn svg{ width:19px; height:19px; filter:drop-shadow(0 2px 6px rgba(0,0,0,.9)); }
  .mute-btn .off{ display:none; }
  .mute-btn.muted .on{ display:none; }
  .mute-btn.muted .off{ display:block; }

  button:focus-visible,
  .cta:focus-visible{
    outline:2px solid #fff;
    outline-offset:3px;
  }

  @media (max-width:640px){
    .product-label.raised{ bottom:34%; }
    .product-label .name{
      text-shadow:0 2px 14px rgba(0,0,0,.95), 0 1px 3px #000;
    }
    .nav-btn{ width:60px; height:60px; }
    .nav-btn::before{ inset:7px; }
    .nav-btn svg{ width:29px; height:29px; }
    .measure-panel{
      left:0; right:0; bottom:0;
      width:100%;
      padding:28px 6% max(24px, env(safe-area-inset-bottom));
      background:linear-gradient(to top, rgba(9,9,8,.985), rgba(9,9,8,.9) 62%, rgba(9,9,8,0));
      border:0;
      backdrop-filter:none;
      transform:translateY(18px);
      gap:18px;
    }
    .measure-panel.visible{ transform:translateY(0); }
    .stepper-row{ width:100%; justify-content:space-between; gap:18px; }
    .stepper{ flex:1; }
    .stepper .controls{ justify-content:space-between; }
    .cta{ width:100%; justify-content:center; }
  }
  @media (min-width:641px){
    .product-label,
    .product-label.raised{
      top:17%;
      bottom:auto;
    }
  }
</style>
</head>
<body>
  <main class="stage">
    <canvas id="scene"></canvas>

    <p class="hint" id="hint">Movela con el dedo, el mouse, o inclinando el teléfono</p>

    <button class="mute-btn" id="muteBtn" aria-label="Silenciar música">
      <svg class="on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18 6a8.5 8.5 0 0 1 0 12"/></svg>
      <svg class="off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>
    </button>

    <div class="product-label" id="productLabel">
      <span class="name" id="productName">Blackout</span>
      <span class="color" id="productColor">Blanco</span>
    </div>

    <button class="nav-btn nav-prev" id="prevBtn" aria-label="Producto anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <button class="nav-btn nav-next" id="nextBtn" aria-label="Producto siguiente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
    </button>

    <div class="measure-panel" id="measurePanel">
      <div class="stepper-row">
        <div class="stepper">
          <span class="stepper-label">Ancho</span>
          <div class="controls">
            <button type="button" data-step="ancho" data-dir="-1" aria-label="Reducir ancho">−</button>
            <span class="value" id="anchoValue">120</span>
            <span class="unit">cm</span>
            <button type="button" data-step="ancho" data-dir="1" aria-label="Aumentar ancho">+</button>
          </div>
        </div>
        <div class="stepper">
          <span class="stepper-label">Alto</span>
          <div class="controls">
            <button type="button" data-step="alto" data-dir="-1" aria-label="Reducir alto">−</button>
            <span class="value" id="altoValue">150</span>
            <span class="unit">cm</span>
            <button type="button" data-step="alto" data-dir="1" aria-label="Aumentar alto">+</button>
          </div>
        </div>
      </div>

      <a class="cta" id="ctaQuote" href="https://www.rollershow.com.ar/cotizar/tradicionales" aria-label="Cotizar tu cortina tradicional en RollerShow">
        Cotizá tu cortina
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="m14 6 6 6-6 6"/></svg>
      </a>
    </div>
  </main>

<script type="module" src="main.js"></script>
</body>
</html>
