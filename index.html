<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rollershow — Cortinas tradicionales</title>
<meta name="description" content="Blackout, Gasa y Torsor. Movés la tela con el dedo, el mouse o inclinando el teléfono. Elegí tu medida y pedila por WhatsApp.">
<meta name="theme-color" content="#140d09">
<link rel="preload" as="image" href="img/ventana-golden-hour.avif" fetchpriority="high" imagesrcset="img/ventana-golden-hour.avif" type="image/avif">
<style>
  :root{
    --ink:#f6efe6;
    --muted:rgba(246,239,230,.62);
    --accent:#C63A21;
    --accent-ink:#fff;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#140d09;
    color:var(--ink);
    font-family:system-ui, -apple-system, 'Segoe UI', sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100svh;
    overflow:hidden;
  }

  /* Escena única: foto fija en su relación de aspecto real, nunca recortada.
     El look es deliberadamente fijo (no responde a light/dark del SO). */
  .stage{
    position:relative;
    width:min(100vw, calc(100svh * 1024 / 1536));
    height:min(100svh, calc(100vw * 1536 / 1024));
    overflow:hidden;
  }
  .stage img.bg{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  .cloth-wrap{
    position:absolute;
    touch-action:none;
    transition:opacity .25s ease;
  }
  canvas.cloth{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  .product-label{
    position:absolute;
    left:6%;
    bottom:9%;
    z-index:4;
    pointer-events:none;
    transition:bottom .5s cubic-bezier(.16,1,.3,1);
  }
  .product-label.raised{ bottom:34%; }
  .product-label .name,
  .product-label .color{
    display:block;
    transition:opacity .35s ease, transform .35s ease;
  }
  .product-label .name{
    font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(30px, 7vw, 44px);
    line-height:1;
    text-shadow:0 2px 18px rgba(0,0,0,.45);
  }
  .product-label .color{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:8px;
    text-shadow:0 1px 8px rgba(0,0,0,.5);
  }
  .product-label.switching .name,
  .product-label.switching .color{
    opacity:0;
    transform:translateY(6px);
  }

  .nav-btn{
    position:absolute;
    top:44%;
    transform:translateY(-50%);
    z-index:5;
    width:48px; height:48px;
    display:flex; align-items:center; justify-content:center;
    background:none; border:none;
    color:var(--ink);
    cursor:pointer;
    opacity:.8;
    transition:opacity .2s ease, transform .2s ease;
  }
  .nav-btn:hover{ opacity:1; }
  .nav-btn:active{ transform:translateY(-50%) scale(.92); }
  .nav-btn:disabled{ opacity:.25; pointer-events:none; }
  .nav-prev{ left:1%; }
  .nav-next{ right:1%; }
  .nav-btn svg{ width:24px; height:24px; filter:drop-shadow(0 1px 6px rgba(0,0,0,.65)); }

  .dots{
    position:absolute;
    top:44%;
    left:50%;
    transform:translate(-50%,140px);
    z-index:5;
    display:none;
  }

  .measure-panel{
    position:absolute;
    left:0; right:0; bottom:0;
    z-index:6;
    padding:30px 6% max(24px, env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(9,6,3,.94), rgba(9,6,3,.68) 55%, transparent);
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    justify-content:space-between;
    gap:20px;
    transform:translateY(18px);
    opacity:0;
    pointer-events:none;
    transition:opacity .6s cubic-bezier(.16,1,.3,1), transform .6s cubic-bezier(.16,1,.3,1);
  }
  .measure-panel.visible{ opacity:1; transform:translateY(0); pointer-events:auto; }

  .stepper-row{ display:flex; gap:30px; }
  .stepper{ display:flex; flex-direction:column; gap:8px; }
  .stepper .stepper-label{
    font-size:10.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .stepper .controls{
    display:flex;
    align-items:baseline;
    gap:12px;
    border-bottom:1px solid rgba(246,239,230,.28);
    padding-bottom:7px;
  }
  .stepper button{
    background:none;
    border:none;
    color:var(--ink);
    font-size:19px;
    line-height:1;
    cursor:pointer;
    padding:2px 2px;
    opacity:.75;
  }
  .stepper button:hover{ opacity:1; }
  .stepper .value{
    font-variant-numeric:tabular-nums;
    font-size:21px;
    min-width:2.6ch;
    text-align:center;
  }
  .stepper .unit{ font-size:11px; color:var(--muted); }

  .cta{
    background:var(--accent);
    color:var(--accent-ink);
    border:none;
    padding:15px 24px;
    border-radius:3px;
    font-size:14.5px;
    font-weight:600;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:9px;
    white-space:nowrap;
    box-shadow:0 8px 24px rgba(198,58,33,.35);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cta:hover{ transform:translateY(-1px); box-shadow:0 10px 28px rgba(198,58,33,.45); }
  .cta:active{ transform:translateY(0); }
  .cta svg{ width:17px; height:17px; }

  .hint{
    position:absolute;
    left:6%;
    top:8%;
    z-index:4;
    font-size:11.5px;
    letter-spacing:.06em;
    color:var(--muted);
    text-shadow:0 1px 8px rgba(0,0,0,.5);
    opacity:1;
    transition:opacity .5s ease;
  }
  .hint.hidden{ opacity:0; }

  @media (min-width:640px){
    .stage{ border-radius:6px; box-shadow:0 40px 120px rgba(0,0,0,.55); }
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <picture>
      <source srcset="img/ventana-golden-hour.avif" type="image/avif">
      <img class="bg" src="img/ventana-golden-hour.jpg" alt="Puerta ventana con luz de atardecer" fetchpriority="high" decoding="sync">
    </picture>

    <div class="cloth-wrap" id="clothWrap">
      <canvas class="cloth" id="cloth"></canvas>
    </div>

    <p class="hint" id="hint">Movela con el dedo, el mouse, o inclinando el teléfono</p>

    <div class="product-label" id="productLabel">
      <span class="name" id="productName">Blackout</span>
      <span class="color" id="productColor">Gris</span>
    </div>

    <button class="nav-btn nav-prev" id="prevBtn" aria-label="Producto anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <button class="nav-btn nav-next" id="nextBtn" aria-label="Producto siguiente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
    </button>

    <div class="measure-panel" id="measurePanel">
      <div class="stepper-row">
        <div class="stepper">
          <span class="stepper-label">Ancho</span>
          <div class="controls">
            <button type="button" data-step="ancho" data-dir="-1" aria-label="Reducir ancho">−</button>
            <span class="value" id="anchoValue">120</span>
            <span class="unit">cm</span>
            <button type="button" data-step="ancho" data-dir="1" aria-label="Aumentar ancho">+</button>
          </div>
        </div>
        <div class="stepper">
          <span class="stepper-label">Alto</span>
          <div class="controls">
            <button type="button" data-step="alto" data-dir="-1" aria-label="Reducir alto">−</button>
            <span class="value" id="altoValue">150</span>
            <span class="unit">cm</span>
            <button type="button" data-step="alto" data-dir="1" aria-label="Aumentar alto">+</button>
          </div>
        </div>
      </div>

      <a class="cta" id="ctaWhatsapp" href="#" target="_blank" rel="noopener" aria-label="Pedir presupuesto por WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.44 1.32 4.94L2 22l5.29-1.39a9.87 9.87 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.45 9.9-9.91C21.95 6.45 17.5 2 12.04 2zm5.8 14.03c-.24.68-1.4 1.3-1.93 1.38-.5.08-1.11.11-1.79-.11-.41-.13-.94-.3-1.62-.6-2.85-1.23-4.71-4.1-4.85-4.29-.14-.19-1.15-1.53-1.15-2.92s.72-2.07.98-2.35c.25-.28.55-.35.74-.35.18 0 .37 0 .53.01.17.01.4-.06.62.48.24.58.81 2 .88 2.15.07.15.11.32.02.51-.09.19-.14.31-.28.47-.14.16-.29.36-.42.48-.14.13-.28.28-.12.55.16.28.71 1.19 1.53 1.94 1.05.96 1.94 1.26 2.21 1.4.28.14.44.12.6-.07.17-.19.71-.84.9-1.13.19-.28.37-.24.62-.14.25.09 1.6.77 1.87.91.27.14.45.21.51.32.07.12.07.68-.17 1.36z"/></svg>
      Pedir por WhatsApp</a>
    </div>
  </main>

<script>
(() => {
  const stage = document.getElementById('stage');
  const canvas = document.getElementById('cloth');
  const clothWrap = document.getElementById('clothWrap');
  const ctx = canvas.getContext('2d');
  const hint = document.getElementById('hint');
  const productLabel = document.getElementById('productLabel');
  const productName = document.getElementById('productName');
  const productColor = document.getElementById('productColor');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const measurePanel = document.getElementById('measurePanel');
  const anchoValue = document.getElementById('anchoValue');
  const altoValue = document.getElementById('altoValue');
  const ctaWhatsapp = document.getElementById('ctaWhatsapp');

  // === Área del vidrio dentro de la foto (% del stage). Medido a ojo sobre
  // el render final de ventana-golden-hour; ajustar acá si se regenera la foto. ===
  const FRAME = { top: 0.115, left: 0.245, right: 0.925, bottom: 0.78 };

  const WHATSAPP_NUMBER = '5491140813223';

  const PRODUCTS = [
    { name: 'Blackout', color: 'Gris', tex: 'img/tela-blackout-gris.png', tileDisplayPx: 34,
      stiffness: 0.96, gravity: 560, friction: 0.985, mouseInfluence: 20, dragCap: 5, fillAlpha: 0.97 },
    { name: 'Gasa', color: 'Beige', tex: 'img/tela-gasa-beige.png', tileDisplayPx: 26,
      stiffness: 0.90, gravity: 420, friction: 0.975, mouseInfluence: 26, dragCap: 8, fillAlpha: 0.42 },
    { name: 'Torsor', color: 'Blanco', tex: 'img/tela-torsor-blanco.png', tileDisplayPx: 40,
      stiffness: 0.94, gravity: 500, friction: 0.98, mouseInfluence: 22, dragCap: 6, fillAlpha: 0.75 },
  ];

  const COLS = 13, ROWS = 19;
  const ITERATIONS = 3;
  const TEAR_MULT = 999; // esta cortina no se rasga: es la pieza hermosa, no la demo de rotura

  const ANCHO_MIN = 60, ANCHO_MAX = 300, ANCHO_DEFAULT = 120;
  const ALTO_MIN = 60, ALTO_MAX = 260, ALTO_DEFAULT = 150;
  const WIDTH_FRAC_RANGE = [0.35, 1.0];
  const HEIGHT_FRAC_RANGE = [0.4, 1.0];

  let anchoCm = ANCHO_DEFAULT;
  let altoCm = ALTO_DEFAULT;

  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;

  // ---------- carga de texturas ----------
  function loadImage(src) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.src = src;
    });
  }
  function makeTileCanvas(img, displayPx) {
    const c = document.createElement('canvas');
    c.width = c.height = Math.round(displayPx);
    const cctx = c.getContext('2d');
    cctx.imageSmoothingEnabled = true;
    cctx.imageSmoothingQuality = 'high';
    cctx.drawImage(img, 0, 0, c.width, c.height);
    return c;
  }

  // ---------- estado de física (un solo mesh compartido) ----------
  let W = 0, H = 0;
  let points = [], constraints = [], cells = [];
  let restCellArea = 0, tearDist = 9999;
  let clothTopY = 0, clothLeftX = 0, clothRightX = 0;
  const ROLLER_H = 13;

  let currentIndex = 0;
  let active = PRODUCTS[0];
  let transition = null; // { from, to, t, duration }

  const mouse = { x: 0, y: 0, px: 0, py: 0, down: false };
  let tiltX = 0, tiltY = 0;
  let motionEnabled = false;
  const TILT_STRENGTH = 340;

  function layoutClothWrap() {
    const stageRect = stage.getBoundingClientRect();
    const frameLeftPx = stageRect.width * FRAME.left;
    const frameTopPx = stageRect.height * FRAME.top;
    const frameWidthPx = stageRect.width * (FRAME.right - FRAME.left);
    const frameHeightPx = stageRect.height * (FRAME.bottom - FRAME.top);

    const wFrac = lerp(WIDTH_FRAC_RANGE[0], WIDTH_FRAC_RANGE[1], clamp((anchoCm - ANCHO_MIN) / (ANCHO_MAX - ANCHO_MIN), 0, 1));
    const hFrac = lerp(HEIGHT_FRAC_RANGE[0], HEIGHT_FRAC_RANGE[1], clamp((altoCm - ALTO_MIN) / (ALTO_MAX - ALTO_MIN), 0, 1));

    const widthPx = frameWidthPx * wFrac;
    const heightPx = frameHeightPx * hFrac;
    const leftPx = frameLeftPx + (frameWidthPx - widthPx) / 2;
    const topPx = frameTopPx;

    clothWrap.style.left = leftPx + 'px';
    clothWrap.style.top = topPx + 'px';
    clothWrap.style.width = widthPx + 'px';
    clothWrap.style.height = heightPx + 'px';

    resize();
  }

  function resize() {
    const rect = canvas.getBoundingClientRect();
    W = rect.width; H = rect.height;
    if (W < 2 || H < 2) return;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    build();
  }

  function build() {
    points = []; constraints = []; cells = [];
    const padding = W * 0.02;
    clothTopY = ROLLER_H;
    clothLeftX = padding;
    clothRightX = W - padding;
    const clothW = clothRightX - clothLeftX;
    const clothH = Math.max(10, H - clothTopY);
    const spacingX = clothW / COLS;
    const spacingY = clothH / ROWS;
    restCellArea = spacingX * spacingY;
    tearDist = Math.max(spacingX, spacingY) * TEAR_MULT;

    for (let y = 0; y <= ROWS; y++) {
      for (let x = 0; x <= COLS; x++) {
        const px = clothLeftX + x * spacingX;
        const py = clothTopY + y * spacingY;
        points.push({ x: px, y: py, px, py, pinned: y === 0 });
        const idx = points.length - 1;
        if (x > 0) constraints.push({ a: idx - 1, b: idx, len: spacingX, broken: false });
        if (y > 0) constraints.push({ a: idx - (COLS + 1), b: idx, len: spacingY, broken: false });
      }
    }
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const i = y * (COLS + 1) + x;
        cells.push({ tl: i, tr: i + 1, bl: i + (COLS + 1), br: i + (COLS + 2), broken: false });
      }
    }
  }

  function currentParam(key) {
    if (!transition) return active[key];
    return lerp(transition.from[key], transition.to[key], transition.t);
  }

  function update(dt) {
    const dt2 = dt * dt;
    const gravity = currentParam('gravity');
    const friction = currentParam('friction');
    const mouseInfluence = currentParam('mouseInfluence');
    const dragCap = currentParam('dragCap');
    const stiffness = currentParam('stiffness');

    for (const p of points) {
      if (p.pinned) continue;
      const vx = (p.x - p.px) * friction;
      const vy = (p.y - p.py) * friction;
      p.px = p.x; p.py = p.y;
      p.x += vx + tiltX * dt2;
      p.y += vy + gravity * dt2;
      if (mouse.down) {
        const dx = p.x - mouse.x, dy = p.y - mouse.y;
        if (dx * dx + dy * dy < mouseInfluence * mouseInfluence) {
          const moveX = mouse.x - mouse.px, moveY = mouse.y - mouse.py;
          p.px = p.x - clamp(moveX, -dragCap, dragCap);
          p.py = p.y - clamp(moveY, -dragCap, dragCap);
        }
      }
      if (p.y > H) { p.y = H; p.py = p.y; }
    }

    for (let i = 0; i < ITERATIONS; i++) {
      for (const c of constraints) {
        if (c.broken) continue;
        const p1 = points[c.a], p2 = points[c.b];
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.0001;
        if (dist > tearDist) { c.broken = true; continue; }
        const diff = (c.len - dist) / dist * stiffness;
        const ox = dx * 0.5 * diff, oy = dy * 0.5 * diff;
        if (!p1.pinned) { p1.x -= ox; p1.y -= oy; }
        if (!p2.pinned) { p2.x += ox; p2.y += oy; }
      }
    }
  }

  function buildCellPath() {
    ctx.beginPath();
    for (const cell of cells) {
      if (cell.broken) continue;
      const tl = points[cell.tl], tr = points[cell.tr], bl = points[cell.bl], br = points[cell.br];
      ctx.moveTo(tl.x, tl.y);
      ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(br.x, br.y);
      ctx.lineTo(bl.x, bl.y);
      ctx.closePath();
    }
  }

  function drawFabricPass(product, alpha) {
    if (alpha <= 0.002 || !product.tileCanvas) return;
    buildCellPath();
    ctx.globalAlpha = alpha * product.fillAlpha;
    ctx.fillStyle = ctx.createPattern(product.tileCanvas, 'repeat');
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawFoldShadows(alpha) {
    ctx.globalCompositeOperation = 'multiply';
    for (const cell of cells) {
      if (cell.broken) continue;
      const tl = points[cell.tl], tr = points[cell.tr], bl = points[cell.bl], br = points[cell.br];
      const area = Math.abs((tr.x - tl.x) * (bl.y - tl.y) - (bl.x - tl.x) * (tr.y - tl.y));
      const ratio = area / restCellArea;
      if (ratio < 0.72) {
        const a = Math.min(0.5, (0.72 - ratio) * 0.9) * alpha;
        ctx.fillStyle = `rgba(40,28,18,${a})`;
        ctx.beginPath();
        ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y); ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y); ctx.closePath();
        ctx.fill();
      }
    }
    ctx.globalCompositeOperation = 'source-over';
  }

  function drawHighlight(alpha) {
    ctx.globalCompositeOperation = 'screen';
    const grad = ctx.createLinearGradient(0, clothTopY, 0, clothTopY + 34);
    grad.addColorStop(0, `rgba(255,214,140,${0.24 * alpha})`);
    grad.addColorStop(1, 'rgba(255,214,140,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    for (const cell of cells) {
      if (cell.broken) continue;
      const tl = points[cell.tl], tr = points[cell.tr], bl = points[cell.bl], br = points[cell.br];
      ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y); ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y); ctx.closePath();
    }
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }

  function drawRoller() {
    const rollerY = clothTopY - ROLLER_H;
    const left = clothLeftX - 3, right = clothRightX + 3;
    const w = right - left;
    ctx.fillStyle = 'rgba(0,0,0,.32)';
    ctx.fillRect(left + 2, rollerY + ROLLER_H - 2, w, 4);
    const rg = ctx.createLinearGradient(0, rollerY, 0, rollerY + ROLLER_H);
    rg.addColorStop(0, '#e9e2d6');
    rg.addColorStop(0.5, '#cabfa9');
    rg.addColorStop(1, '#9c8f76');
    ctx.fillStyle = rg;
    ctx.fillRect(left, rollerY, w, ROLLER_H);
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    if (transition) {
      drawFabricPass(transition.from, 1 - transition.t);
      drawFabricPass(transition.to, transition.t);
      drawFoldShadows(1);
      drawHighlight(1);
    } else {
      drawFabricPass(active, 1);
      drawFoldShadows(1);
      drawHighlight(1);
    }
    drawRoller();
  }

  // ---------- gestos: mouse + touch (distingue drag de scroll) ----------
  const PHYS = { decideThreshold: 6 };
  let touchStartX = 0, touchStartY = 0, gestureMode = null;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  function onMouseDown(e) {
    ensureMotionPermission();
    revealMeasurePanel();
    const p = getPos(e);
    mouse.x = mouse.px = p.x; mouse.y = mouse.py = p.y;
    mouse.down = true;
  }
  function onMouseMove(e) {
    if (!mouse.down) return;
    const p = getPos(e);
    mouse.px = mouse.x; mouse.py = mouse.y;
    mouse.x = p.x; mouse.y = p.y;
  }
  function onMouseUp() { mouse.down = false; }

  function onTouchStart(e) {
    ensureMotionPermission();
    revealMeasurePanel();
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
    gestureMode = null;
  }
  function onTouchMove(e) {
    const t = e.touches[0];
    const dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
    if (gestureMode === null) {
      if (Math.hypot(dx, dy) < PHYS.decideThreshold) return;
      if (Math.abs(dy) > Math.abs(dx) * 2.5 && Math.abs(dy) > 16) {
        gestureMode = 'scroll'; mouse.down = false; return;
      }
      gestureMode = 'interact';
      const rect = canvas.getBoundingClientRect();
      mouse.x = mouse.px = touchStartX - rect.left;
      mouse.y = mouse.py = touchStartY - rect.top;
      mouse.down = true;
    }
    if (gestureMode === 'interact') {
      e.preventDefault();
      const p = getPos(e);
      mouse.px = mouse.x; mouse.py = mouse.y;
      mouse.x = p.x; mouse.y = p.y;
    }
  }
  function onTouchEnd() { mouse.down = false; gestureMode = null; }

  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('touchstart', onTouchStart, { passive: true });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  window.addEventListener('touchend', onTouchEnd);
  window.addEventListener('touchcancel', onTouchEnd);
  window.addEventListener('resize', layoutClothWrap);

  // ---------- acelerómetro ----------
  function onOrientation(e) {
    if (e.gamma == null || e.beta == null) return;
    const targetX = clamp(Math.sin(e.gamma * Math.PI / 180), -1, 1) * TILT_STRENGTH;
    tiltX += (targetX - tiltX) * 0.08;
  }
  function ensureMotionPermission() {
    if (motionEnabled) return;
    motionEnabled = true;
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then((state) => { if (state === 'granted') window.addEventListener('deviceorientation', onOrientation); })
        .catch(() => {});
    } else if ('DeviceOrientationEvent' in window) {
      window.addEventListener('deviceorientation', onOrientation);
    }
  }

  // ---------- carrusel ----------
  let switching = false;
  function goTo(nextIndex) {
    if (switching) return;
    switching = true;
    prevBtn.disabled = true; nextBtn.disabled = true;
    const from = active;
    const to = PRODUCTS[nextIndex];
    transition = { from, to, t: 0, duration: 550 };
    productLabel.classList.add('switching');
    setTimeout(() => {
      productName.textContent = to.name;
      productColor.textContent = to.color;
      productLabel.classList.remove('switching');
    }, 260);

    const start = performance.now();
    function step(now) {
      const t = clamp((now - start) / transition.duration, 0, 1);
      transition.t = 1 - Math.pow(1 - t, 3); // easeOutCubic
      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        active = to;
        currentIndex = nextIndex;
        transition = null;
        switching = false;
        prevBtn.disabled = false; nextBtn.disabled = false;
        updateWhatsappLink();
      }
    }
    requestAnimationFrame(step);
  }
  prevBtn.addEventListener('click', () => goTo((currentIndex - 1 + PRODUCTS.length) % PRODUCTS.length));
  nextBtn.addEventListener('click', () => goTo((currentIndex + 1) % PRODUCTS.length));

  // ---------- steppers ancho/alto ----------
  document.querySelectorAll('[data-step]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const dir = Number(btn.dataset.dir);
      if (btn.dataset.step === 'ancho') {
        anchoCm = clamp(anchoCm + dir * 10, ANCHO_MIN, ANCHO_MAX);
        anchoValue.textContent = anchoCm;
      } else {
        altoCm = clamp(altoCm + dir * 10, ALTO_MIN, ALTO_MAX);
        altoValue.textContent = altoCm;
      }
      layoutClothWrap();
      updateWhatsappLink();
    });
  });

  function updateWhatsappLink() {
    const p = PRODUCTS[currentIndex];
    const msg = `Hola! Quiero cotizar un Roller ${p.name} ${p.color} de ${anchoCm}x${altoCm}cm`;
    ctaWhatsapp.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  }

  // ---------- revelado progresivo del panel de medidas ----------
  let panelRevealed = false;
  function revealMeasurePanel() {
    if (panelRevealed) return;
    panelRevealed = true;
    measurePanel.classList.add('visible');
    productLabel.classList.add('raised');
    hint.classList.add('hidden');
  }
  setTimeout(revealMeasurePanel, 2500);

  // ---------- arranque ----------
  async function boot() {
    const images = await Promise.all(PRODUCTS.map((p) => loadImage(p.tex)));
    PRODUCTS.forEach((p, i) => { p.tileCanvas = makeTileCanvas(images[i], p.tileDisplayPx); });

    layoutClothWrap();
    updateWhatsappLink();

    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000, 1 / 30);
      last = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }

  boot();

  // Hook de introspección para verificación automatizada (Playwright).
  window.__cortina = {
    getState: () => ({
      currentIndex, anchoCm, altoCm, switching,
      productName: PRODUCTS[currentIndex].name,
      productColor: PRODUCTS[currentIndex].color,
      clothWrapRect: clothWrap.getBoundingClientRect(),
    }),
  };
})();
</script>
</body>
</html>
